version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: slotted-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: slotted
      POSTGRES_USER: slotted
      POSTGRES_PASSWORD: slotted_dev_pw

    ports:
      - "5433:5432"

    volumes:
      - slotted_pg_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slotted"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: slotted-redis
    restart: unless-stopped

    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5


  app-services:
    build:
      context: ./app-services
      dockerfile: Dockerfile
    container_name: slotted_app
    restart: unless-stopped
    ports:
      - '4001:4001'
    environment:
      PORT: 4000
      DATABASE_URL: postgres://slotted:slotted_pass@postgres:5432/slotted
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL: 7d
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET}
      QUEUE_ENGINE_URL: http://queue-engine:5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      queue-engine:
        condition: service_started
  
  queue-engine: 
    build: 
      context: ./queue-engine
      dockerfile: Dockerfile
    container_name: slotted_queue
    restart: unless-stopped
    ports: 
      - '5000:5000'
    environment: 
      REDIS_URL: tcp://redis:6379
      QUEUE_ALLOWED_THROUGH: 1000
      QUEUE_ENGINE_PORT: 5000
    depends_on: 
      redis: 
        condition: service_healthy

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: slotted_frontend
    restart: unless-stopped
    ports: 
      - '3000:80'
    depends_on: 
      - app-services

volumes: 
  slotted_pg_data:
  redis_data: